name: "Publish Orbit Release"

on:
  push:
    tags:
      - 'v*' # Se activa automáticamente cuando subes un tag que empiece con 'v' (ej. v1.0.0, v1.0.1)

jobs:
  publish-tauri:
    permissions:
      contents: write # Otorga permisos a GitHub Actions para publicar en Releases
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Configurar entorno de Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Ajusta a la versión de Go que estés usando

      # 2. Configurar Node.js indicando la ruta del lockfile
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json' # Ajusta 'frontend' a la ruta exacta de tu subcarpeta

      # 3. Compilar el Backend en Go como Sidecar de Tauri
      - name: Build Go Sidecar
        run: |
          cd backend/cmd/api
          go build -o ../src-tauri/binaries/orbit-api-x86_64-pc-windows-msvc.exe main.go

      # 4. Instalar dependencias del Frontend
      - name: Install frontend dependencies
        run: npm install

      # 5. Compilar la App con Tauri, Firmar y Publicar en GitHub
      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSPHRASE: ${{ secrets.TAURI_KEY_PASSPHRASE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Orbit ${{ github.ref_name }}'
          releaseBody: 'Notas del parche para ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false