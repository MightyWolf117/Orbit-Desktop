name: "Publish Orbit Release"

on:
  push:
    tags:
      - 'v*' # Se activa al subir tags que empiecen por 'v' (ej. v1.0.0)

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Configurar entorno de Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 2. Configurar Node.js (apuntando al lockfile de /frontend)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # 3. Compilar el Backend en Go directamente en la carpeta de binarios de Tauri
      - name: Build Go Sidecar
        run: |
          cd backend/cmd/api
          go build -o ../../../frontend/src-tauri/orbit-api-x86_64-pc-windows-msvc.exe main.go

      # 4. Instalar dependencias del Frontend dentro de /frontend
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          npm run build

      # 5. Compilar la App con Tauri y Publicar en GitHub
      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSPHRASE: ${{ secrets.TAURI_KEY_PASSPHRASE }}
        with:
          projectPath: 'frontend' # <-- Le indica a Tauri que tu proyecto está en /frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Orbit ${{ github.ref_name }}'
          releaseBody: 'Notas del parche para ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false